<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Monopoly Room Engine</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", sans-serif;
        display: grid;
        place-items: center;
        color: #382914;
        background: linear-gradient(180deg, #fffdf4 0%, #f7f2e4 100%);
      }
      .card {
        max-width: 420px;
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid rgba(120, 90, 36, 0.28);
        border-radius: 16px;
        padding: 24px;
        text-align: center;
      }
      h1 {
        margin: 0 0 8px;
      }
      p {
        margin: 0;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <section class="card">
      <h1>Вы офлайн</h1>
      <p>Сеть временно недоступна. Вернитесь в интернет, чтобы продолжить синхронизацию комнаты.</p>
    </section>
  </body>
</html>
